{# =============================================================================
   templates/web/_logo.html — SuperGaming hexagon badge + PRIME RUSH SUPPORT lockup.
   Swappable: when a Prime Rush game logo lands, replace ONLY the <svg> badge below.
   Never recolor or stretch the badge; respect clear space (gap in .logo).
   Params (via {% include with context %} or macro): none — pure partial.
============================================================================= #}
{% macro logo_badge(size=24) %}
<svg class="logo__badge" width="{{ size }}" height="{{ (size * 1.125)|round|int }}"
     viewBox="0 0 24 27" fill="none" aria-hidden="true"
     style="width:{{ size }}px;height:{{ (size * 1.125)|round|int }}px">
  <path d="M12 1 22 6.75V20.25L12 26 2 20.25V6.75L12 1Z" stroke="currentColor" stroke-width="1.5"/>
  <path d="M9.2 17.4V9.6h3.1c1.7 0 2.7.9 2.7 2.4 0 1.2-.7 2-1.8 2.3l1.9 3.1h-1.7l-1.7-2.9h-1v2.9H9.2Zm1.5-4.1h1.4c.8 0 1.3-.4 1.3-1.1 0-.7-.5-1.1-1.3-1.1h-1.4v2.2Z" fill="currentColor"/>
</svg>
{% endmacro %}

{% macro logo_lockup(href='/', support_label='SUPPORT') %}
<a class="logo" href="{{ href }}" aria-label="Prime Rush {{ support_label }} — home">
  {{ logo_badge(24) }}
  <span class="logo__text">
    <span class="logo__name">Prime Rush</span>
    <span class="logo__sub">{{ support_label }}</span>
  </span>
</a>
{% endmacro %}
